name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # Cross-compiled on the arm64 runner: Apple's toolchain targets
          # both architectures natively, and intel runners are scarce.
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system libraries (macroquad)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          [ "$GITHUB_REF_TYPE" = "tag" ] || version="dev-${GITHUB_SHA::7}"
          pkg="minerust-${version}-${{ matrix.name }}"
          mkdir -p "$pkg"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/minerust.exe" "$pkg/"
            cp README.md "$pkg/"
            7z a "$pkg.zip" "$pkg"
          else
            cp "target/${{ matrix.target }}/release/minerust" "$pkg/"
            cp README.md "$pkg/"
            tar czf "$pkg.tar.gz" "$pkg"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minerust-${{ matrix.name }}
          path: |
            minerust-*.tar.gz
            minerust-*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
